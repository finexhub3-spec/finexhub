<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rdGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldCoinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#rdGrad)"/>
  <g transform="translate(50,50)">
    <!-- Calendar Body (discipline) -->
    <rect x="70" y="40" width="150" height="150" rx="12" fill="#ffffff" stroke="#1e293b" stroke-width="4"/>
    <rect x="70" y="40" width="150" height="35" rx="12" fill="#ef4444" />
    <rect x="70" y="65" width="150" height="10" fill="#ef4444" />
    
    <!-- Calendar Rings -->
    <rect x="100" y="25" width="12" height="25" rx="4" fill="#94a3b8" stroke="#1e293b" stroke-width="2"/>
    <rect x="178" y="25" width="12" height="25" rx="4" fill="#94a3b8" stroke="#1e293b" stroke-width="2"/>
    
    <!-- Calendar grid representation -->
    <circle cx="105" cy="100" r="8" fill="#e2e8f0" />
    <circle cx="145" cy="100" r="8" fill="#e2e8f0" />
    <circle cx="185" cy="100" r="8" fill="#e2e8f0" />
    
    <circle cx="105" cy="135" r="8" fill="#e2e8f0" />
    <circle cx="145" cy="135" r="8" fill="#10b981" /> <!-- target day marked green -->
    <circle cx="185" cy="135" r="8" fill="#e2e8f0" />
    
    <circle cx="105" cy="165" r="8" fill="#e2e8f0" />
    <circle cx="145" cy="165" r="8" fill="#e2e8f0" />
    <circle cx="185" cy="165" r="8" fill="#e2e8f0" />
    
    <!-- Growing Coins Stack next to Calendar -->
    <!-- Stack 1 (Low) -->
    <ellipse cx="250" cy="170" rx="20" ry="8" fill="url(#goldCoinGrad)" stroke="#d97706" stroke-width="1.5"/>
    <rect x="230" y="170" width="40" height="10" fill="url(#goldCoinGrad)" stroke="#d97706" stroke-width="1.5"/>
    <ellipse cx="250" cy="180" rx="20" ry="8" fill="url(#goldCoinGrad)" stroke="#d97706" stroke-width="1.5"/>
    
    <!-- Stack 2 (Medium) -->
    <ellipse cx="280" cy="130" rx="20" ry="8" fill="url(#goldCoinGrad)" stroke="#d97706" stroke-width="1.5"/>
    <rect x="260" y="130" width="40" height="20" fill="url(#goldCoinGrad)" stroke="#d97706" stroke-width="1.5"/>
    <ellipse cx="280" cy="150" rx="20" ry="8" fill="url(#goldCoinGrad)" stroke="#d97706" stroke-width="1.5"/>
    <rect x="260" y="150" width="40" height="20" fill="url(#goldCoinGrad)" stroke="#d97706" stroke-width="1.5"/>
    <ellipse cx="280" cy="170" rx="20" ry="8" fill="url(#goldCoinGrad)" stroke="#d97706" stroke-width="1.5"/>
    <rect x="260" y="170" width="40" height="10" fill="url(#goldCoinGrad)" stroke="#d97706" stroke-width="1.5"/>
    <ellipse cx="280" cy="180" rx="20" ry="8" fill="url(#goldCoinGrad)" stroke="#d97706" stroke-width="1.5"/>
  </g>
</svg>
