<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lifeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#lifeGrad)"/>
  <g transform="translate(50,50)">
    <!-- Protective Umbrella Dome above -->
    <path d="M 100 95 C 100 50, 300 50, 300 95" fill="none" stroke="#93c5fd" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    
    <!-- Shield Outline -->
    <path d="M 200 40 C 250 40 270 50 270 100 C 270 160 200 200 200 210 C 200 200 130 160 130 100 C 130 50 150 40 200 40 Z" fill="#ffffff" stroke="#1e3a8a" stroke-width="4" stroke-linejoin="round"/>
    
    <!-- Inner Shield Area -->
    <path d="M 200 52 C 240 52 255 60 255 100 C 255 150 200 185 200 195 C 200 185 145 150 145 100 C 145 60 160 52 200 52 Z" fill="#eff6ff"/>
    
    <!-- Family Silhouette inside the shield -->
    <!-- Father -->
    <circle cx="175" cy="100" r="10" fill="#3b82f6"/>
    <path d="M 160 115 L 190 115 L 185 150 L 165 150 Z" fill="#3b82f6" rx="3"/>
    
    <!-- Mother -->
    <circle cx="225" cy="103" r="9" fill="#60a5fa"/>
    <path d="M 212 116 L 238 116 L 233 150 L 217 150 Z" fill="#60a5fa" rx="3"/>
    
    <!-- Child (Center) -->
    <circle cx="200" cy="120" r="7" fill="#fbbf24"/>
    <path d="M 190 130 L 210 130 L 206 150 L 194 150 Z" fill="#fbbf24" rx="2"/>
    
    <!-- Protecting Hands Arc below -->
    <path d="M 150 160 Q 200 175 250 160" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
