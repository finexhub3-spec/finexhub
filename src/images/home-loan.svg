<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="homeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#homeGradient)"/>
  <g transform="translate(50,50)">
    <!-- House outline -->
    <polygon points="150,100 250,100 250,200 150,200" fill="#FFFFFF" stroke="#2C5282" stroke-width="3"/>
    <!-- Roof -->
    <polygon points="130,100 200,30 270,100" fill="#E53E3E" stroke="#C53030" stroke-width="3"/>
    <!-- Door -->
    <rect x="190" y="150" width="20" height="50" fill="#2D3748"/>
    <!-- Windows -->
    <rect x="160" y="120" width="20" height="20" fill="#4299E1"/>
    <rect x="220" y="120" width="20" height="20" fill="#4299E1"/>
    <rect x="190" y="120" width="20" height="15" fill="#2D3748"/>
  </g>
</svg>