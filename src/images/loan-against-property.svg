<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="propertyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E53E3E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9B2C2C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldCoinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#propertyGrad)"/>
  <g transform="translate(50,50)">
    <!-- House / Real Estate Icon (Property) -->
    <polygon points="120,80 200,20 280,80" fill="#f8fafc" stroke="#1e293b" stroke-width="4"/>
    <polygon points="105,80 200,10 295,80" fill="#ef4444" stroke="#991b1b" stroke-width="3"/>
    <rect x="130" y="80" width="140" height="100" fill="#f8fafc" stroke="#1e293b" stroke-width="4"/>
    
    <!-- Windows and Door -->
    <rect x="150" y="100" width="25" height="25" rx="3" fill="#3b82f6" stroke="#1e293b" stroke-width="2"/>
    <rect x="225" y="100" width="25" height="25" rx="3" fill="#3b82f6" stroke="#1e293b" stroke-width="2"/>
    <rect x="185" y="130" width="30" height="50" rx="2" fill="#1e293b"/>
    
    <!-- Money bag / Capital (borrowed funds) next to house -->
    <g transform="translate(230, 110)">
      <!-- Gold Coin 1 -->
      <ellipse cx="40" cy="50" rx="18" ry="7" fill="url(#goldCoinGrad)" stroke="#b45309" stroke-width="1.5"/>
      <rect x="22" y="50" width="36" height="8" fill="url(#goldCoinGrad)" stroke="#b45309" stroke-width="1.5"/>
      <ellipse cx="40" cy="58" rx="18" ry="7" fill="url(#goldCoinGrad)" stroke="#b45309" stroke-width="1.5"/>
      
      <!-- Gold Coin 2 -->
      <ellipse cx="40" cy="35" rx="18" ry="7" fill="url(#goldCoinGrad)" stroke="#b45309" stroke-width="1.5"/>
      <rect x="22" y="35" width="36" height="15" fill="url(#goldCoinGrad)" stroke="#b45309" stroke-width="1.5"/>
      <ellipse cx="40" cy="50" rx="18" ry="7" fill="url(#goldCoinGrad)" stroke="#b45309" stroke-width="1.5"/>
    </g>

    <!-- Key representing unlocking value of property -->
    <g transform="translate(70, 120)">
      <circle cx="20" cy="20" r="10" fill="#fef08a" stroke="#1e293b" stroke-width="2.5"/>
      <circle cx="20" cy="20" r="4" fill="#E53E3E" stroke="#1e293b" stroke-width="1"/>
      <rect x="30" y="16" width="35" height="8" rx="2" fill="#fef08a" stroke="#1e293b" stroke-width="2.5"/>
      <rect x="50" y="24" width="6" height="10" fill="#fef08a" stroke="#1e293b" stroke-width="2.5"/>
      <rect x="58" y="24" width="6" height="10" fill="#fef08a" stroke="#1e293b" stroke-width="2.5"/>
    </g>
  </g>
</svg>