<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="eduGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#eduGrad)"/>
  <g transform="translate(50,50)">
    <!-- Stack of Books at bottom -->
    <path d="M 80 180 L 240 180 L 250 195 L 90 195 Z" fill="#f8fafc" stroke="#1e293b" stroke-width="2"/>
    <rect x="90" y="195" width="160" height="15" rx="3" fill="#3b82f6" stroke="#1e293b" stroke-width="2"/>
    
    <path d="M 70 155 L 250 155 L 260 172 L 80 172 Z" fill="#f8fafc" stroke="#1e293b" stroke-width="2"/>
    <rect x="80" y="172" width="180" height="15" rx="3" fill="#ef4444" stroke="#1e293b" stroke-width="2"/>
    
    <!-- Graduation Cap / Mortarboard -->
    <!-- Cap Base -->
    <rect x="120" y="115" width="100" height="30" rx="4" fill="#1e293b" stroke="#000000" stroke-width="2"/>
    <ellipse cx="170" cy="145" rx="50" ry="10" fill="#475569" stroke="#1e293b" stroke-width="2"/>
    
    <!-- Cap Top Diamond -->
    <polygon points="170,60 270,90 170,120 70,90" fill="#0f172a" stroke="#000000" stroke-width="3"/>
    
    <!-- Tassel -->
    <circle cx="170" cy="90" r="4" fill="#fbbf24"/>
    <path d="M 170 90 L 105 110 L 100 135" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <polygon points="100,135 96,145 104,145" fill="#fbbf24" stroke="#fbbf24" stroke-width="1"/>
    
    <!-- Diploma Scroll next to books -->
    <g transform="translate(230,120) rotate(-15)">
      <rect x="0" y="0" width="20" height="80" rx="5" fill="#fef08a" stroke="#1e293b" stroke-width="2"/>
      <rect x="-3" y="35" width="26" height="10" fill="#ef4444" rx="2"/> <!-- ribbon -->
      <ellipse cx="10" cy="0" rx="10" ry="4" fill="#eab308" stroke="#1e293b" stroke-width="1.5"/>
      <ellipse cx="10" cy="80" rx="10" ry="4" fill="#eab308" stroke="#1e293b" stroke-width="1.5"/>
    </g>
  </g>
</svg>
