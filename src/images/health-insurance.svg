<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="healthGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#healthGrad)"/>
  <g transform="translate(50,50)">
    <!-- Heartbeat Line (ECG) in background -->
    <path d="M 30 140 L 90 140 L 105 100 L 120 180 L 135 130 L 150 150 L 165 140 L 270 140" fill="none" stroke="#a7f3d0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    
    <!-- Shield Outline -->
    <path d="M 200 40 C 250 40 270 50 270 100 C 270 160 200 200 200 210 C 200 200 130 160 130 100 C 130 50 150 40 200 40 Z" fill="#ffffff" stroke="#065f46" stroke-width="4" stroke-linejoin="round"/>
    
    <!-- Inner Shield Area -->
    <path d="M 200 52 C 240 52 255 60 255 100 C 255 150 200 185 200 195 C 200 185 145 150 145 100 C 145 60 160 52 200 52 Z" fill="#ecfdf5"/>
    
    <!-- Red/Green Medical Cross in Center -->
    <g transform="translate(200, 110)">
      <rect x="-12" y="-30" width="24" height="60" rx="4" fill="#10b981"/>
      <rect x="-30" y="-12" width="60" height="24" rx="4" fill="#10b981"/>
      <!-- Inner cross highlight -->
      <rect x="-6" y="-24" width="12" height="48" rx="2" fill="#34d399"/>
      <rect x="-24" y="-6" width="48" height="12" rx="2" fill="#34d399"/>
    </g>
  </g>
</svg>
